name: Deploy Custom Services to EKS

on:
  workflow_dispatch:
  push:
    branches: [ master, develop, release/*, poc/docker-build-issue-fix ]
    paths:
      - "forms-flow-custom-services/**"
      - "VERSION"

defaults:
  run:
    shell: bash

jobs:
  build-and-push:
    if: github.repository == 'yaseen-aot/forms-flow-ai'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
        with:
          install: true

      # Generate unique version using timestamp (version.YYYYMMDDHHMMSS)
      - name: Set version
        id: get_version
        run: |
          VER=$(cat VERSION)
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            VER=${VER/-alpha/''}
          fi
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          FINAL_VER="${VER}.${TIMESTAMP}"
          echo "VERSION=${FINAL_VER}" >> $GITHUB_ENV
          echo "version=${FINAL_VER}" >> $GITHUB_OUTPUT
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      # Build and push Custom Services Image
      - name: Build and push Custom Services
        uses: docker/build-push-action@v4
        with:
          context: forms-flow-custom-services
          file: forms-flow-custom-services/Dockerfile
          push: true
          tags: docker.io/formsflow/epic-custom-service:${{ env.VERSION }}

  deploy:
    needs: build-and-push
    if: github.repository == 'yaseen-aot/forms-flow-ai'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set version
        run: |
          echo "VERSION=${{ needs.build-and-push.outputs.version }}" >> $GITHUB_ENV

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOYMENT_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOYMENT_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Update Kube config
        run: aws eks update-kubeconfig --region ca-central-1 --name ${{ secrets.QA_EKS_CLUSTER }}

      - name: Deploy Custom Services to EKS
        run: |
          echo "Deploying updated Custom Services..."
          kubectl -n ${{ secrets.QA_OPENSOURCE_NAMESPACE }} patch deployment forms-flow-custom-services -p '{"spec":{"template":{"spec":{"containers":[{"name":"forms-flow-custom-services","image":"docker.io/formsflow/epic-custom-service:${{ env.VERSION }}"}]}}}}' || echo "skip"
          kubectl rollout restart deployment forms-flow-custom-services -n ${{ secrets.QA_OPENSOURCE_NAMESPACE }} || echo "restart skipped"
