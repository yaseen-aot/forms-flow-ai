# Send mails via SMTP. The given settings are for Gmail.
mail.transport.protocol=smtp

mail.smtp.host=smtp.gmail.com
mail.smtp.port=465
mail.smtp.auth=true
mail.smtp.ssl.enable=true
mail.smtp.socketFactory.port=465
mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

# Poll mails via IMAPS.
mail.store.protocol=imaps
mail.imaps.host=imap.gmail.com
mail.imaps.port=993
mail.imaps.timeout=10000

mail.sender=donotreply
mail.sender.alias=DoNotReply

mail.attachment.download=true
mail.attachment.path=attachments

# Credentials injected via JVM flags: -Dmail.user=VALUE -Dmail.password=VALUE
# camunda-bpm-mail-core merges System.getProperties() into the mail session,
# so -D flags take effect without needing keys here.
# Set MAIL_USER and MAIL_PASSWORD in your .env file.
